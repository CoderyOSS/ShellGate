launcher:
  command: ./start-gate.sh
  ready_socket: /tmp/gate-probes.sock
  poll_interval_ms: 50
  poll_timeout_ms: 10000

proof:
  output: proof-records.md
  title: ShellGate E2E Proof Records

interfaces:
  unix:
    client:
      path: /tmp/gate-probes.sock
      timeout_ms: 30000
  sql:
    path: /tmp/gate-probes.db
  http:
    server:
      port: 19876
