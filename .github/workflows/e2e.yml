name: E2E Tests

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  e2e-seccomp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build with e2e feature
        run: |
          sudo apt-get update && sudo apt-get install -y libseccomp-dev
          cargo build --features e2e

      - name: Run E2E tests via VPS
        run: |
          ssh vps '
            set -e
            cd /opt/codery/projects/ShellGate
            git pull origin main
            docker run --rm \
              --security-opt seccomp=unconfined \
              --volume /opt/codery/projects/ShellGate:/home/gem/projects/ShellGate \
              --workdir /home/gem/projects/ShellGate \
              --entrypoint bash \
              ghcr.io/coderyoss/codery:apps-green \
              -c "
                export PATH=/usr/local/cargo/bin:\$PATH
                cargo build --features e2e
                cargo test --features e2e -- --test-threads=1
              "
          '

  e2e-probes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build gate-server
        run: |
          sudo apt-get update && sudo apt-get install -y libseccomp-dev
          cargo build

      - name: Run Probes pipeline tests
        run: |
          cd tests/probes
          bun install @codery/probes
          bun test
