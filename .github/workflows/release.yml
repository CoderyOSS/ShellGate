name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libseccomp-dev
          if echo "${{ matrix.target }}" | grep -q musl; then
            sudo apt-get install -y musl-tools
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build gate-server
        run: |
          cargo build --release --target ${{ matrix.target }} --bin gate-server
          cargo build --release --target ${{ matrix.target }} --bin sgsh-connect

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist

          for bin in gate-server sgsh-connect; do
            cp target/${{ matrix.target }}/release/$bin dist/
            tar czf "dist/${bin}-${VERSION}-${{ matrix.target }}.tar.gz" \
              -C dist $bin
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*.tar.gz

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}

  publish-feature:
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish Dev Container Feature
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./devcontainer-feature"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
